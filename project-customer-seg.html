# Segmentación de Clientes en E-Commerce
## Transformando Datos de Transacciones en Estrategia de Ingresos

---

## El Desafío

Todo negocio tiene un problema que los datos pueden resolver, pero **la mayoría de empresas no saben realmente quiénes son sus clientes**.

Un minorista de e-commerce basado en el Reino Unido tenía:
- **4,338 clientes** durante un año de operaciones
- **£8.9 millones** en ingresos
- **Cero información** sobre cuáles clientes valía la pena mantener

**La Pregunta**: ¿Podrían identificarse grupos de clientes con valores y necesidades dramáticamente distintos? ¿Podría construirse una estrategia alrededor de ellos?

---

## Lo que Descubrí

### El Principio de Pareto Confirmado

El 15.8% superior de clientes genera **72.7% de todos los ingresos**. Un pequeño grupo de VIPs carga todo el negocio sobre sus hombros.

### Emergieron Cuatro Personas de Cliente Distintas

| Segmento | Tamaño | Ingresos | Valor Promedio | Insight Clave |
|-------|---------|------|---------|-----------|
| Clientes VIP | 687 | 63.7% | £8,235 | Compran semanalmente, máxima lealtad |
| Clientes Leales | 1,599 | 22.0% | £1,220 | Base estable del negocio |
| Grandes Gastadores Ocasionales | 312 | 8.7% | £2,471 | Alto valor pero esporádico |
| En Riesgo / Inactivos | 1,740 | 5.7% | £292 | No han comprado en meses |

---

## El Proceso de Análisis

### Paso 1: Transformar Datos Crudos en Historias de Clientes

- Agregué 541,909 transacciones individuales en 4,338 perfiles de cliente
- Construí **métricas RFM** (Recencia, Frecuencia, Monetaria) para medir valor de cliente y nivel de engagement

### Paso 2: Encontrar Clusters Naturales de Clientes

- Apliqué clustering K-Means para identificar agrupaciones naturales
- Usé el Método del Codo para determinar el número óptimo de segmentos (k=4)
- Validé separación de clusters con visualización PCA

### Paso 3: Interpretar Resultados a Través de la Lente de Negocio

- Perfilé cada cluster con significado real de negocio
- Analicé patrones temporales (tendencias de ingresos en el tiempo)
- Identifiqué patrones de estacionalidad y engagement

---

## La Historia que Cada Segmento Cuenta

### Clientes VIP (15.8% | 63.7% de ingresos)

**Perfil:** Compran cada 2 semanas en promedio (14 compras/año), gastando £8,235 por cliente, última compra hace solo 15 días.

**Recomendación:** Programa VIP Exclusivo, Gestión de Relaciones, Personalización a Escala, Oportunidad de Expansión.

**Impacto Esperado:** +5-10% retención = **£200K-400K ingresos adicionales**

---

### Clientes Leales (36.9% | 22% de ingresos)

**Perfil:** Compran 3-4 veces al año, gastando £1,220 por cliente, última compra hace 49 días.

**Recomendación:** Programa de Upsell, Recompensas de Lealtad, Venta Cruzada, Construcción de Comunidad.

**Impacto Esperado:** +20-30% aumento de frecuencia = **£150K-200K ingresos adicionales**

---

### Grandes Compradores Ocasionales (7.2% | 8.7% de ingresos)

**Perfil:** Compran dos veces al año (esporádico), gastando £2,471 por cliente, última compra hace 124 días.

**Recomendación:** Outreach Predictivo, Recomendaciones Personalizadas, Gestión de Cuenta Dedicada.

**Impacto Esperado:** +20-30% frecuencia de compra = **£50K-75K ingresos adicionales**

---

### En Riesgo / Inactivos (40.1% | 5.7% de ingresos)

**Perfil:** Compraron solo 1-2 veces, gastando solo £292 por cliente, última compra hace 155 días.

**Recomendación:** Campaña de Recuperación con Incentivos (15% descuento), Segmentación Inteligente por categoría de producto original, Monitoreo de Rotación.

**Impacto Esperado:** +15-20% reactivación = **£20K-30K ingresos adicionales**

---

## Resumen de Impacto de Negocio

| Iniciativa | Segmento Target | Ganancia Esperada | Cronograma |
|-----------|---|---|---|
| Programa de Lealtad VIP | VIP | +£200K-400K | 30 días |
| Upsell/Venta Cruzada | Leales | +£150K-200K | 90 días |
| Campaña de Engagement | Ocasionales | +£50K-75K | 90 días |
| Programa de Recuperación | En Riesgo | +£20K-30K | Continuo |
| **OPORTUNIDAD TOTAL** | **Todos** | **+£420K-705K** | **6 meses** |

Con estrategias reflexivas específicas por segmento, este análisis puede desbloquear **más de £500K adicionales en ingresos anuales** sin adquirir un solo cliente nuevo.

---

## Arquitectura Técnica

**Fase 1: Preparación de Datos** — Limpié 541,909 transacciones, eliminé cancelaciones y registros inválidos

**Fase 2: Ingeniería de Características** — Construí métricas RFM desde transacciones crudas, agregadas a nivel de cliente, creé 5 dimensiones conductuales

**Fase 3: Análisis Exploratorio** — Identifiqué distribución de Pareto, analicé correlaciones, perfilé distribuciones conductuales

**Fase 4: Clustering** — Apliqué K-Means con k=4, características estandarizadas, validé con visualización PCA

**Fase 5: Interpretación** — Perfilé cada cluster con significado de negocio, analicé patrones temporales, generé recomendaciones accionables

---

## Herramientas Utilizadas

`Python` · `Pandas & NumPy` · `Scikit-learn` · `Matplotlib & Seaborn` · `Jupyter Notebooks` · `Dashboard Streamlit`

---

## Métricas Clave

| Métrica | Valor |
|--------|-------|
| Clientes Analizados | 4,338 |
| Transacciones | 541,909 |
| Ingresos Analizados | £8,886,209 |
| Período de Tiempo | 365 días |
| Segmentos Identificados | 4 |
| Impacto de Ingresos Esperado | +£420K-705K |

---

## Insights Clave

> **"Solo 15.8% de clientes generan 72.7% de ingresos"**

Este único insight cambia todo acerca de cómo asignas presupuesto de marketing, soporte al cliente y enfoque estratégico.

> **"Cada segmento tiene un lever diferente"**

- VIP: Lealtad y retención
- Leales: Frecuencia y upsell
- Ocasionales: Engagement y recordatorios
- En Riesgo: Reactivación rentable o salida elegante

---

*La ciencia de datos no se trata de construir modelos perfectos — se trata de encontrar el insight que cambia cómo piensas en tu negocio.*

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
