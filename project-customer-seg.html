# Customer Segmentation in E-Commerce
## Transforming Transaction Data into Revenue Strategy

---

## The Challenge

Every business has a problem that data can solve, but **most companies don't really know who their customers are**.

A UK-based e-commerce retailer had:
- **4,338 customers** during one year of operations
- **£8.9 million** in revenue
- **Zero information** on which customers were worth keeping

**The Question**: Could groups of customers with dramatically different values and needs be identified? Could a strategy be built around them?

---

## What I Discovered

### The Pareto Principle Confirmed

The top 15.8% of customers generate **72.7% of all revenue**. A small group of VIPs carries the entire business on their shoulders.

### Four Distinct Customer Personas Emerged

| Segment | Size | Revenue | Average Value | Key Insight |
|-------|---------|------|---------|-----------|
| VIP Customers | 687 | 63.7% | £8,235 | Buy weekly, maximum loyalty |
| Loyal Customers | 1,599 | 22.0% | £1,220 | Stable foundation of the business |
| Large Occasional Spenders | 312 | 8.7% | £2,471 | High value but sporadic |
| At Risk / Inactive | 1,740 | 5.7% | £292 | Haven't purchased in months |

---

## The Analysis Process

### Step 1: Transform Raw Data into Customer Stories

- I aggregated 541,909 individual transactions into 4,338 customer profiles
- I built **RFM metrics** (Recency, Frequency, Monetary) to measure customer value and engagement level

### Step 2: Find Natural Clusters of Customers

- I applied K-Means clustering to identify natural groupings
- I used the Elbow Method to determine the optimal number of segments (k=4)
- I validated cluster separation with PCA visualization

### Step 3: Interpret Results Through the Business Lens

- I profiled each cluster with real business meaning
- I analyzed temporal patterns (revenue trends over time)
- I identified seasonality and engagement patterns

---

## The Story Each Segment Tells

### VIP Customers (15.8% | 63.7% of revenue)

**Profile:** Purchase every 2 weeks on average (14 purchases/year), spending £8,235 per customer, last purchase just 15 days ago.

**Recommendation:** Exclusive VIP Program, Relationship Management, Personalization at Scale, Expansion Opportunity.

**Expected Impact:** +5-10% retention = **£200K-400K additional revenue**

---

### Loyal Customers (36.9% | 22% of revenue)

**Profile:** Purchase 3-4 times per year, spending £1,220 per customer, last purchase 49 days ago.

**Recommendation:** Upsell Program, Loyalty Rewards, Cross-sell, Community Building.

**Expected Impact:** +20-30% frequency increase = **£150K-200K additional revenue**

---

### Large Occasional Spenders (7.2% | 8.7% of revenue)

**Profile:** Purchase twice per year (sporadic), spending £2,471 per customer, last purchase 124 days ago.

**Recommendation:** Predictive Outreach, Personalized Recommendations, Dedicated Account Management.

**Expected Impact:** +20-30% purchase frequency = **£50K-75K additional revenue**

---

### At Risk / Inactive (40.1% | 5.7% of revenue)

**Profile:** Purchased only 1-2 times, spending just £292 per customer, last purchase 155 days ago.

**Recommendation:** Recovery Campaign with Incentives (15% discount), Smart Segmentation by original product category, Churn Monitoring.

**Expected Impact:** +15-20% reactivation = **£20K-30K additional revenue**

---

## Business Impact Summary

| Initiative | Target Segment | Expected Gain | Timeline |
|-----------|---|---|---|
| VIP Loyalty Program | VIP | +£200K-400K | 30 days |
| Upsell/Cross-sell | Loyal | +£150K-200K | 90 days |
| Engagement Campaign | Occasional | +£50K-75K | 90 days |
| Recovery Program | At Risk | +£20K-30K | Ongoing |
| **TOTAL OPPORTUNITY** | **All** | **+£420K-705K** | **6 months** |

With thoughtful segment-specific strategies, this analysis can unlock **more than £500K in additional annual revenue** without acquiring a single new customer.

---

## Technical Architecture

**Phase 1: Data Preparation** — I cleaned 541,909 transactions, removed cancellations and invalid records

**Phase 2: Feature Engineering** — I built RFM metrics from raw transactions, aggregated to customer level, created 5 behavioral dimensions

**Phase 3: Exploratory Analysis** — I identified Pareto distribution, analyzed correlations, profiled behavioral distributions

**Phase 4: Clustering** — I applied K-Means with k=4, standardized features, validated with PCA visualization

**Phase 5: Interpretation** — I profiled each cluster with business meaning, analyzed temporal patterns, generated actionable recommendations

---

`Python` · `Pandas & NumPy` · `Scikit-learn` · `Matplotlib & Seaborn` · `Jupyter Notebooks` · `Dashboard Streamlit`

---

## Key Insights

> **"Only 15.8% of customers generate 72.7% of revenue"**

This single insight changes everything about how you allocate marketing budget, customer support, and strategic focus.

> **"Each segment has a different lever"**

- VIP: Loyalty and retention
- Loyal: Frequency and upsell
- Occasional: Engagement and reminders
- At Risk: Profitable reactivation or graceful exit

---

*Data science is not about building perfect models — it's about finding the insight that changes how you think about your business.*

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
