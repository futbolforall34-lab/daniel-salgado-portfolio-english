# YouTube Streaming Trends

## Executive Summary

Can we quantify how long a video will stay visible in trending? This project analyzes over 537,000 records of YouTube trending videos in Mexico and the United States (2020–2024) to build a model that predicts how many days a video will stay in the ranking.

## The Challenge

YouTube's trending algorithm distributes approximately 200 videos daily per country on a highly visible list. For a creator or brand, being in trends can mean millions of additional views, but the duration in the ranking determines the total reach.

## My Approach

I built a multidimensional analytical engine:

1. **Feature Engineering:** I extracted 24 variables from first-day signals (engagement, temporal, title content, SEO).
2. **Comparative Analysis:** I identified structural differences between markets (Mexico dominated by Entertainment and Music; US by Gaming).
3. **Predictive Modeling:** I trained models with LightGBM, achieving R² of 0.39 and MAE of 1.43 days.

## Skills Demonstrated

- **Feature Engineering:** Logarithmic transformations, ratios, basic NLP analysis of titles, temporal features.
- **Predictive Modeling:** LightGBM, Ridge Regression, cross-validation, early stopping.
- **Interpretability:** SHAP TreeExplainer to explain individual predictions.
- **Data Analysis:** Building robust targets, handling data gaps, multidimensional analysis.

## Impactful Results

- **Regional Discovery:** Videos in Mexico stay in trends 60% longer than in the US (median 8 vs 5 days).
- **Critical Factor:** Day 1 engagement is the dominant predictor in both markets.
- **Creator Playbook:** Shorter titles, immediate virality, and Music/Entertainment content predict greater durability.

## Next Steps

- **Semantic NLP:** Multilingual sentence-transformers embeddings for deeper title analysis.
- **Channel Features:** Add channel history as an additional predictor.
- **Computer Vision:** Thumbnail analysis for visual features.

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

const md = document.getElementById('md-source').textContent;
document.getElementById('md-content').innerHTML = marked.parse(md);
