# Motor de Precios Predictivos para Riesgo de Seguros
## Transformando un Dataset "Sin Señal" en un Marco Profesional de Validación ML

**Industria:** InsurTech / Análisis Actuarial

**Desafío Central:** Construir un motor de precios transparente y equitativo para predecir primas de seguros anuales.

**El Giro:** El proyecto pasó de ser una tarea de predicción estándar a un **estudio crítico de validación de datos** cuando se descubrió que el dataset carecía de cualquier señal predictiva real.

---

## El Desafío de Negocio

En la industria de seguros, el precio es un equilibrio de alto riesgo. Subpreciar lleva a pérdidas insostenibles, mientras que sobrepreciar resulta en rotación inmediata de clientes. Para ser viable, un modelo de precios debe ser:

1. **Preciso:** Reflejando el riesgo real del asegurado.
2. **Explicable:** Capaz de justificar cada centavo de una prima a reguladores y clientes.
3. **Justo:** Asegurando ausencia de sesgo discriminatorio basado en atributos protegidos.

**El Objetivo:** Crear un pipeline end-to-end que tome un perfil de riesgo y genere una cotización de prima justificada.

---

## El Viaje Técnico

### El Momento "¡Ajá!": Detección de Señal

La mayoría de proyectos ML comienzan con limpieza y pasan a modelado. En este proyecto, el **EDA fue la fase más valiosa**.

Al analizar 276,000 registros, descubrí que la correlación entre el target (`Monto de Prima`) y los predictores más fuertes (como `Puntaje de Crédito` o `Puntaje de Salud`) era casi **cero** (≤ 0.005).

**Insight Senior:** Un científico de datos junior habría pasado semanas ajustando hiperparámetros para exprimir un mejor R². En su lugar, reconocí esto como un **artefacto de datos sintéticos**. Cambié la propuesta de valor del proyecto: *El objetivo ya no era lograr alta precisión (lo cual sería matemáticamente imposible), sino construir un pipeline listo para producción que pudiera probar el fracaso de un modelo.*

### Ingeniería para Robustez

A pesar de la falta de señal, implementé un pipeline profesional de ingeniería de características:

- **Transformación del Target:** Apliqué transformación de Raíz Cuadrada para manejar sesgo derecho (Skewness 1.50 → 0.48), asegurando un proceso de entrenamiento más estable.
- **Features Orientadas al Dominio:** Creé un `Risk_Score` y `High_Risk_Flag` basados en lógica actuarial (combinando estado de fumador, salud y reclamaciones).
- **Manejo MNAR:** Identifiqué un patrón "Faltante No Al Azar" en `Ocupación` y `Reclamaciones Previas` (exactamente 29.15% de nulos), tratando la ausencia de datos como característica.

### Combatiendo Sesgo de Modelo (Gini vs. SHAP)

Comparé cuatro arquitecturas (Regresión Lineal, Random Forest, XGBoost y LightGBM). Aunque todas convergieron a la media (R² ≈ 0), el valor real vino de la **Auditoría de Explicabilidad**.

Comparé **Gini Impurity** con **SHAP Values** y descubrí un sesgo crítico: Gini sobrevaloró `Ingresos Anuales` simplemente porque tenía más valores únicos (sesgo de cardinalidad). SHAP lo corrigió, probando que `Puntaje de Salud` era el driver más influyente.

---

## Resultados e Impacto de Negocio

### Validación Técnica

- **Madurez de Pipeline:** Construí exitosamente un pipeline reproducible desde Datos Crudos → Ingeniería de Características → Comparación de Modelos → Explicabilidad → Despliegue.
- **Auditoría de Equidad:** Realicé análisis MAE basado en género, detectando una brecha de $14 en tasas de error, simulando una verificación de cumplimiento regulatorio.
- **Herramientas Interactivas:** Desplegué una app Streamlit que proporciona análisis "¿Qué pasa si?", permitiendo a usuarios ver exactamente cómo cambiar una variable (p.ej., dejar de fumar) desplazaría la prima.

### El Resultado "Profesional"

Si este hubiera sido un caso de negocio real, mi recomendación habría sido: **"No desplegar. Los datos están defectuosos."**

Ahorrar a una empresa de desplegar un modelo de caminata aleatoria vale más que cualquier métrica R². Este proyecto demuestra la capacidad de mantener **integridad estadística** bajo presión.

---

- Diseño de Pipeline ML End-to-End

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

const md = document.getElementById('md-source').textContent;
document.getElementById('md-content').innerHTML = marked.parse(md);
document.getElementById('loader').classList.add('hidden');
</script>
