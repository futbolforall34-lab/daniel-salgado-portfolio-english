# Optimizador de Estrategia de Retención
### People Analytics — Predicción y Prevención de Rotación de Empleados

---

## Resumen Ejecutivo

Una empresa tecnológica con casi 15,000 empleados enfrenta una tasa de rotación del 23.8% — equivalente a perder 3,522 empleados al año a un costo estimado de $176 millones USD anuales.

Construí un sistema end-to-end de People Analytics que va más allá de predecir quién se va: **explica por qué se van y simula el impacto financiero de cada intervención posible antes de implementarla**.

El resultado: un programa de retención que reduce la rotación en un 53.8% y genera un ahorro potencial de **$94.8 millones USD** con un ROI del 9,879%.

---

## El Problema de Negocio

La mayoría de las empresas abordan la rotación de manera reactiva: esperan a que alguien renuncie para actuar. El costo de esa espera es enorme.

Pero hay un problema más profundo: **los mejores empleados son los primeros en irse**. No por insatisfacción genérica, sino porque la empresa los está sobreexplotando sin reconocerlos.

El análisis reveló que empleados con excelente evaluación pero baja satisfacción tienen una tasa de rotación del **84.7%** — casi cuatro veces el promedio. Son los más valiosos y los que más riesgo tienen de salida.

---

## El Descubrimiento Clave: Dos Tipos de Rotación

El EDA reveló una estructura bifurcada que no era evidente en la correlación lineal:

**Tipo 1 — Rotación por Insatisfacción** (satisfacción < 0.4)
- Empleados agotados, mal compensados, ignorados
- Tasa de rotación: 44-58%
- Señales: pocas horas O muchas horas, salario bajo

**Tipo 2 — Rotación por Oportunidad** (evaluación > 0.8, satisfacción < 0.5)
- Los mejores empleados, explotados y no reconocidos
- Tasa de rotación: **84.7%**
- Señales: alta evaluación + muy pocas promociones + muchos proyectos

Esta bifurcación cambió completamente la estrategia. Para el Tipo 1 se necesita intervención de compensación; para el Tipo 2, reconocimiento y plan de carrera. Tratarlos igual sería un error costoso.

---

## Metodología

### Pipeline de 5 Notebooks

```
NB01: Auditoría → NB02: EDA → NB03: Features + Clusters → NB04: Modelo → NB05: SHAP + ROI
```

**NB01 — Auditoría de datos**
Dataset completo (0 nulos), pero con señales sistémicas preocupantes: solo 2.1% de empleados fue promovido en 5 años; media de 201 horas mensuales (estándar: 160).

**NB02 — EDA narrativo**
Validé 4 hipótesis de negocio. El hallazgo más importante: la variable `last_evaluation` tiene correlación ~0 con la rotación en análisis lineal, pero un efecto enorme cuando se combina condicionalmente con `satisfaction_level`. Los modelos lineales fallan aquí.

**NB03 — Feature engineering + clustering**
Creé 4 variables derivadas que capturan las interacciones descubiertas en el EDA:
- `top_performer_risk`: lift 3.56x
- `burnout_risk`: lift 2.57x
- `stagnation_flag`: lift 2.08x
- `overload_flag`: lift 1.69x

K-Means con K=3 identificó tres perfiles nítidos de empleados, con tasas de rotación de 8%, 25% y 74%.

**NB04 — Modelado predictivo**
Comparé tres modelos. La Regresión Logística confirmó la no-linealidad del problema (AUC 0.78). XGBoost con validación cruzada 5-Fold y GridSearch logró:
- ROC-AUC: **0.987**
- F1-Score: **0.850**
- Recall: **0.863** (captura 86% de rotaciones reales)

El threshold fue ajustado a 0.38 (vs. 0.5 default) para maximizar recall — en RRHH, una falsa alarma cuesta una conversación; un falso negativo cuesta perder talento.

**NB05 — SHAP + simulador económico**
SHAP permite decirle a RRHH exactamente por qué cada empleado está en riesgo. Para el perfil de alto riesgo típico:

*"Este empleado tiene 94% de probabilidad de irse. Su satisfacción baja (SHAP +0.85) combinada con su excelente evaluación (+0.81) y 264 horas mensuales (+0.61) son los factores principales. Necesita revisión salarial, redistribución de carga y un plan de carrera concreto."*

---

## Habilidades Demostradas

### Técnicas
- Machine Learning end-to-end (EDA → features → model → interpret → deploy)
- XGBoost con optimización de hiperparámetros (GridSearchCV)
- Validación cruzada estratificada (Stratified K-Fold)
- SHAP values para interpretabilidad (global + individual)
- K-Means clustering con selección de K por Silhouette Score
- Feature engineering con validación de lift
- Manejo de desbalance de clases (scale_pos_weight, threshold tuning)

### De Negocio
- Traducción de métricas técnicas a impacto financiero cuantificado
- Simulación de escenarios con ROI estimado por intervención
- Segmentación de empleados accionable por RRHH
- Detección de relaciones no lineales que análisis básico no captura
- Priorización estratégica de intervenciones por costo-beneficio

### Stack Técnico
`Python` `XGBoost` `SHAP` `Scikit-learn` `K-Means` `Pandas` `Matplotlib` `Seaborn` `Streamlit` `Joblib`

---

## Resultados en Números

| Métrica | Valor |
|---------|-------|
| ROC-AUC | 0.987 |
| F1-Score | 0.850 |
| Recall | 86.3% — captura 86 de cada 100 rotaciones |
| Precision | 83.7% — 84% de alertas son válidas |
| Reducción potencial de rotación | -53.8% con programa combinado |
| Ahorro estimado | $94.8M USD anuales |
| ROI del programa | 9,879% |

---

## Lo que Hace Diferente Este Proyecto

**1. Narrativa de negocio, no solo métricas**
Cada output tiene interpretación. No solo "ROC-AUC = 0.987" sino "el modelo puede identificar correctamente si un empleado se va o se queda el 98.7% de las veces cuando compara dos casos al azar".

**2. Decisiones documentadas con razonamiento**
¿Por qué threshold 0.38 y no 0.5? ¿Por qué conservar duplicados? ¿Por qué XGBoost y no Random Forest? Cada decisión tiene su justificación de negocio.

**3. SHAP como herramienta de conversación**
La interpretabilidad no es un lujo técnico — es lo que permite que RRHH use el modelo. Sin SHAP, el modelo es una caja negra con un número. Con SHAP, es un asesor que explica qué está pasando con cada empleado.

**4. Valor económico cuantificado**
El análisis no termina en "el modelo funciona bien". Termina en "esta intervención específica, dirigida a este segmento, generará este ROI en este plazo".

---

## Próximos Pasos

1. **Datos longitudinales:** Incorporar datos de encuestas de engagement mensuales para detectar cambios antes de que cristalicen en decisiones de salida
2. **Modelo de supervivencia (Cox Regression):** Predecir no solo *si* un empleado se va, sino *cuándo*
3. **Análisis causal:** El simulador asume causalidad. Un diseño causal formal (DiD o PSM) permitiría validar que las intervenciones realmente causan la reducción estimada
4. **Deploy en producción:** Integración con sistemas de RRHH (Workday, SAP HCM) para score automático mensual por empleado

---

(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

const md = document.getElementById('md-source').textContent;
document.getElementById('md-content').innerHTML = marked.parse(md);
