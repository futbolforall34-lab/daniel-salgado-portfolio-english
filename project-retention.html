# Retention Strategy Optimizer
### People Analytics — Employee Churn Prediction and Prevention

---

## Executive Summary

A technology company with nearly 15,000 employees faces a churn rate of 23.8% — equivalent to losing 3,522 employees per year at an estimated cost of $176 million USD annually.

I built an end-to-end People Analytics system that goes beyond predicting who leaves: **it explains why they leave and simulates the financial impact of each possible intervention before implementing it**.

The result: a retention program that reduces churn by 53.8% and generates potential savings of **$94.8 million USD** with an ROI of 9,879%.

---

## The Business Problem

Most companies approach churn reactively: they wait for someone to quit before acting. The cost of that wait is enormous.

But there's a deeper problem: **the best employees are the first to leave**. Not from generic dissatisfaction, but because the company is overexploiting them without recognition.

The analysis revealed that employees with excellent ratings but low satisfaction have a churn rate of **84.7%** — nearly four times the average. They are the most valuable and the most at risk of departure.

---

## The Key Discovery: Two Types of Churn

The EDA revealed a bifurcated structure that wasn't evident in linear correlation:

**Type 1 — Dissatisfaction Churn** (satisfaction < 0.4)
- Burned out, underpaid, ignored employees
- Churn rate: 44-58%
- Signals: few hours OR many hours, low salary

**Type 2 — Opportunity Churn** (evaluation > 0.8, satisfaction < 0.5)
- The best employees, exploited and unrecognized
- Churn rate: **84.7%**
- Signals: high evaluation + very few promotions + many projects

This bifurcation completely changed the strategy. Type 1 needs compensation intervention; Type 2 needs recognition and career planning. Treating them the same would be a costly mistake.

---

## Methodology

### 5-Notebook Pipeline

```
NB01: Audit → NB02: EDA → NB03: Features + Clusters → NB04: Model → NB05: SHAP + ROI
```

**NB01 — Data Audit**
Complete dataset (0 nulls), but with concerning systemic signals: only 2.1% of employees promoted in 5 years; average of 201 monthly hours (standard: 160).

**NB02 — Narrative EDA**
I validated 4 business hypotheses. The most important finding: the `last_evaluation` variable has ~0 correlation with churn in linear analysis, but a massive effect when conditionally combined with `satisfaction_level`. Linear models fail here.

**NB03 — Feature engineering + clustering**
I created 4 derived variables that capture the interactions discovered in the EDA:
- `top_performer_risk`: 3.56x lift
- `burnout_risk`: 2.57x lift
- `stagnation_flag`: 2.08x lift
- `overload_flag`: 1.69x lift

K-Means with K=3 identified three sharp employee profiles, with churn rates of 8%, 25%, and 74%.

**NB04 — Predictive Modeling**
I compared three models. Logistic Regression confirmed the non-linearity of the problem (AUC 0.78). XGBoost with 5-Fold cross-validation and GridSearch achieved:
- ROC-AUC: **0.987**
- F1-Score: **0.850**
- Recall: **0.863** (captures 86% of actual churn)

The threshold was adjusted to 0.38 (vs. 0.5 default) to maximize recall — in HR, a false alarm costs a conversation; a false negative costs losing talent.

**NB05 — SHAP + Economic Simulator**
SHAP allows us to tell HR exactly why each employee is at risk. For a typical high-risk profile:

*"This employee has a 94% probability of leaving. Their low satisfaction (SHAP +0.85) combined with their excellent rating (+0.81) and 264 monthly hours (+0.61) are the main factors. They need a salary review, workload redistribution, and a concrete career plan."*

---

## Skills Demonstrated

### Technical
- End-to-end Machine Learning (EDA → features → model → interpret → deploy)
- XGBoost with hyperparameter optimization (GridSearchCV)
- Stratified cross-validation (Stratified K-Fold)
- SHAP values for interpretability (global + individual)
- K-Means clustering with K selection by Silhouette Score
- Feature engineering with lift validation
- Handling class imbalance (scale_pos_weight, threshold tuning)

### Business
- Translation of technical metrics to quantified financial impact
- Scenario simulation with estimated ROI per intervention
- Actionable employee segmentation for HR
- Detection of non-linear relationships that basic analysis misses
- Strategic prioritization of interventions by cost-benefit

### Technical Stack
`Python` `XGBoost` `SHAP` `Scikit-learn` `K-Means` `Pandas` `Matplotlib` `Seaborn` `Streamlit` `Joblib`

---

## Results in Numbers

| Metric | Value |
|---------|-------|
| ROC-AUC | 0.987 |
| F1-Score | 0.850 |
| Recall | 86.3% — captures 86 out of 100 churn cases |
| Precision | 83.7% — 84% of alerts are valid |
| Potential churn reduction | -53.8% with combined program |
| Estimated savings | $94.8M USD annually |
| Program ROI | 9,879% |

---

## What Makes This Project Different

**1. Business narrative, not just metrics**
Every output has interpretation. Not just "ROC-AUC = 0.987" but "the model can correctly identify whether an employee will leave or stay 98.7% of the time when comparing two random cases".

**2. Documented decisions with reasoning**
Why threshold 0.38 and not 0.5? Why keep duplicates? Why XGBoost and not Random Forest? Each decision has its business justification.

**3. SHAP as a conversation tool**
Interpretability is not a technical luxury — it's what allows HR to use the model. Without SHAP, the model is a black box with a number. With SHAP, it's an advisor that explains what's happening with each employee.

**4. Quantified economic value**
The analysis doesn't end at "the model works well". It ends at "this specific intervention, aimed at this segment, will generate this ROI in this timeframe".

---

## Next Steps

1. **Longitudinal data:** Incorporate monthly engagement survey data to detect changes before they crystallize into exit decisions
2. **Survival model (Cox Regression):** Predict not just *if* an employee will leave, but *when*
3. **Causal analysis:** The simulator assumes causality. A formal causal design (DiD or PSM) would allow validating that interventions really cause the estimated reduction
4. **Production deployment:** Integration with HR systems (Workday, SAP HCM) for automatic monthly scoring per employee

(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
