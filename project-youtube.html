# What Makes Videos Last in Trending? — Predictive Analysis YouTube MX vs US

> *An end-to-end data science project that combines feature engineering, LightGBM modeling, and interpretability analysis (SHAP) to answer a concrete business question about the digital content market.*

---

## Executive Summary

I analyzed **537,000+ records** of YouTube trending videos from Mexico and the United States (2020–2024) to build a model that predicts how many days a video will remain in the trending ranking, using only the signals available on its first day of appearance.

The final model (LightGBM trained with combined data) achieves an **R² of 0.39** and an **MAE of 1.43 days** — a substantial improvement over the baseline with actionable findings for content creators, brands, and platforms.

**Main finding:** Videos in Mexico stay in trending **60% longer** than in the United States (median 8d vs 5d), and day 1 engagement is the strongest predictor of durability in both markets.

---

## The Problem

YouTube's trending algorithm distributes ~200 videos daily per country on a highly visible list. For a creator or brand, being in trending can mean millions of additional views — but the duration in the ranking determines the total reach.

**The business questions this project answers:**
- What signals predict how long a video will stay in trending?
- Are the same factors at play in Mexico and the United States?
- Is there an actionable "playbook" to maximize durability?

---

## Methodology

### Complete Pipeline (5 notebooks)

```
Data Audit  →  Feature Engineering  →  Comparative EDA  →  Modeling  →  Conclusions
    NB01             NB02                   NB03              NB04         NB05
```

### Target Construction

The main challenge was building a robust target. The dataset records each daily appearance of a video — not its total duration. I built `days_in_trending` as the **maximum consecutive streak** of each video, excluding the 21-day data capture gap that exists in the dataset. This technical detail avoids artificially inflating the durability of videos that crossed a capture gap.

### Input Features (24 variables)

The model only uses signals from **day 1 of trending** — simulating a real prediction scenario:

| Type | Examples |
|---|---|
| Day 1 engagement | views, likes, comments (log-transformed), like_rate |
| Temporal | hours to trend, publication time, day of week |
| Title content | length, word count, capitals, punctuation |
| SEO | number of tags, has description |
| Category | music, gaming, entertainment, etc. |

---

## Main Findings

### Markets are structurally different...

**Mexico** is dominated by **Entertainment (24%) and Music (22%)**, reflecting the rich Hispanic musical culture — corridos, reggaeton, Latin pop. **United States** has **Gaming as the leading category (20%)**, with an extremely active community of streamers and gamers.

This structural difference matters: a model trained only on US data and applied to MX would have systematic biases.

### ...but the algorithm mechanisms are the same

Despite cultural differences, **day 1 engagement** is the dominant predictor in **both markets**. The `log_likes`, `log_views`, and `log_comments` from the first day lead the SHAP importance in MX and US. The underlying mechanism is universal: YouTube rewards content that generates immediate engagement.

### Viralization speed predicts durability

Videos that reach trending on the **same day of publication** (64.2% in MX, 61.3% in US) have significantly longer durability. There's a clear inverse relationship: the longer a video took to reach trending, the less time it stays there.

### Music and Entertainment generate longer-lasting content

Music videos are consumed repeatedly — they have built-in repeat consumption that the algorithm interprets as a signal of sustained relevance. Gaming and News have high rotation because they depend on current events.

---

## Model Results

| Model | R² | MAE (days) | Improvement vs baseline |
|---|---|---|---|
| Baseline (median) | ~ 0 | 1.75d | — |
| Ridge Regression | 0.106 | 1.22d | moderate |
| LightGBM (by region) | 0.27 | 1.50d | notable |
| **LightGBM (combined MX+US)** | **0.39** | **1.43d** | **substantial** |

**Surprising technical insight:** The combined model (trained with data from MX and US together) outperforms region-specific models by ~56% in R². More training data matters more than market homogeneity, especially when we add a region flag that allows the model to learn the market-specific effects.

---

## Interpretability: SHAP

SHAP analysis doesn't just say *what* features matter, but *how* they influence:

- **High `log_likes`** → pushes prediction upward (more durability)
- **High `days_to_trending`** → pushes downward (less durability)
- **Long `title_length`** → negative effect — shorter titles predict greater durability
- **`category_encoded`** → bidirectional effects; Music pushes upward, News is variable

---

## Recommendations for Creators

### Universal Playbook (MX and US)
1. **Maximize engagement in the first 24 hours** — it's the most predictive factor by a wide margin
2. **Fast viralization > slow accumulation** — a video that explodes immediately generates algorithmic momentum
3. **Concise titles** (< 60 characters) associated with greater durability
4. **High like rate** (engagement quality) matters in addition to volume

### Specific to Mexico
- Average window of 8 days (vs 5 in US) = greater ROI per trending video
- Music and Entertainment content generates greater durability
- Less competition (32k unique videos vs 47k in US) = greater probability of staying

### Specific to United States
- Day 1 engagement is an even stronger predictor in US than in MX
- More competitive market → differentiate by engagement quality (like_rate)

---

## Honest Limitations

- **Moderate R² (~0.39):** Expected in human behavior data. Many factors (external events, real-time algorithm, channel history) are not captured.
- **Positive class only:** The dataset only contains videos that ALREADY reached trending.
- **No channel-level features:** Channel history would be highly predictive but is not in the original dataset.

---

## Next Steps

1. **Semantic NLP:** Replace simple title features with multilingual sentence-transformers embeddings
2. **Channel features:** Add channel history as a feature
3. **Temporal validation:** Train on 2020–2022 and validate on 2023–2024 to verify temporal stability
4. **Binary classification:** Reframe as "Will it reach 7+ days?" — more actionable for content strategists
5. **Computer vision:** Thumbnail analysis for visual features

---

(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
