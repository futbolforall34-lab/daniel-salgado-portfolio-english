# El ADN de un Campeón

### Clustering de Pilotos Históricos de Fórmula 1 — 1950 a 2024

---

## ¿De qué trata este proyecto?

La Fórmula 1 tiene 75 años de historia y una pregunta que nadie ha respondido del todo bien:

**¿Qué hace a un campeón diferente? ¿Es el talento, el coche, o simplemente la era correcta?**

Tomé datos de 861 pilotos, filtré los 266 con carrera suficiente para ser analizados, construí 17 métricas de rendimiento que permiten comparar a Fangio con Verstappen de forma justa, y apliqué clustering no supervisado para dejar que los datos respondieran solos.

El resultado: **4 arquetipos que estructuran toda la historia del deporte**, desde los pioneros de los años 50 hasta los pilotos que corren hoy.

---

## El Problema Real

Comparar pilotos de distintas eras con estadísticas brutas es un error metodológico. Fangio corrió 51 carreras. Hamilton corrió 356. Decir que Hamilton es "mejor" porque tiene más victorias es irrelevante estadísticamente.

La solución fue construir métricas **rate-based**: tasas, proporciones, posiciones relativas. Así, cada piloto se representa por **cómo rindió dado el contexto de su era**, no por cuánto acumuló.

---

## Qué se hizo

El proyecto siguió un pipeline de Data Science completo:

1. **Auditoría de datos** — 8 CSVs relacionales, detección de nulos, rangos temporales, identificación de limitaciones (qualifying sólo completo desde 2003, laptimes desde 1996)

2. **Feature Engineering** — Joins multi-clave entre tablas, construcción de 17 variables derivadas, clasificación de equipos top por era histórica (los equipos dominantes cambian cada década)

3. **EDA** — Correlaciones clave: win_rate correlaciona 0.86 con podium_rate y 0.82 con títulos mundiales. Pero top_team_ratio solo correlaciona 0.47 — el coche importa, pero no lo explica todo.

4. **Clustering K-Means** — Se evaluaron K entre 2 y 11. El K óptimo estadístico fue K=2 (Silhouette=0.351), pero producía una separación trivial y sin valor interpretativo. Se eligió K=4 (Silhouette=0.322), una diferencia de solo 0.029 puntos que se justifica por arquetipos mucho más ricos y accionables.

5. **Perfilado de arquetipos** — Naming narrativo, radar charts por cluster, identificación de pilotos representativos.

6. **Dashboard interactivo** — HTML autocontenido de 95KB con estética F1: mapa del paddock interactivo, radares por arquetipo, Hall of Fame con buscador en tiempo real, 6 insights no obvios.

---

## Lo que se encontró

Los datos revelaron 4 arquetipos naturales que tienen sentido tanto estadística como narrativamente:

**El Panteón** — 11 pilotos. Hamilton, Schumacher, Verstappen, Fangio, Senna, Prost... Win rate del 28%. Casi 1 de cada 3 salidas termina en victoria. 44 títulos mundiales concentrados en este grupo.

**El Gladiador** — 82 pilotos. Alonso, Räikkönen, Mansell, Piquet, Häkkinen... Competidores serios, algunos campeones, pero sus estadísticas globales no alcanzan el nivel del Panteón porque no mantuvieron ese rendimiento toda su carrera.

**El Soldado Moderno** — 37 pilotos. Norris, Russell, Piastri... La era híbrida los define. DNF rate más bajo de la historia (19%) gracias a la fiabilidad mecánica moderna, pero sin acceso a material ganador.

**El Pionero Frágil** — 136 pilotos. El grupo más numeroso. DNF rate del 57% — no porque fueran malos pilotos, sino porque los coches de los años 50-70 simplemente se rompían. Son víctimas estadísticas de su época.

---

## El insight más importante

> El cuadrante "sin buen coche pero con muchas victorias" está **casi vacío** en toda la historia de la F1.

Stirling Moss se acerca. Nadie más. Esto confirma algo que los fans debaten hace décadas: **sin material competitivo es estadísticamente imposible ganar en Fórmula 1**, no importa el talento.

---

## Habilidades demostradas

**Lenguajes y librerías**
- Python (pandas, numpy, scikit-learn, matplotlib, seaborn)
- HTML / CSS / JavaScript
- Chart.js 4.4.0

**Técnicas de Machine Learning**
- K-Means Clustering (sklearn)
- StandardScaler para normalización pre-clustering
- PCA para reducción dimensional (2D y 3D)
- Silhouette Score y Elbow Method para selección de K
- MinMaxScaler para normalización de radar charts

**Data Engineering**
- Joins multi-clave entre 8 tablas relacionales
- Feature engineering desde cero (17 variables derivadas)
- Manejo de datos faltantes con imputación documentada
- Limpieza de columnas con tipos mixtos

**Thinking**
- Decisión de negocio sobre óptimo estadístico (K=4 vs K=2) con justificación documentada
- Diseño de métricas cross-era comparables (rate-based vs. raw totals)
- Clasificación contextual de equipos top por era histórica
- Identificación y documentación de limitaciones del dataset

**Visualización y Storytelling**
- Dashboard interactivo autocontenido (sin backend, sin servidor)
- Estética temática F1: paleta de colores, tipografía Orbitron, animaciones CSS
- Scatter interactivo con filtros por arquetipo y tooltips con estadísticas
- Radar charts comparativos por arquetipo
- Hall of Fame con búsqueda en tiempo real
- 6 insight cards con hallazgos no obvios

---

## Pasos siguientes

Lo que haría si este proyecto tuviera una segunda fase:

- **Clustering jerárquico** para validar que los 4 arquetipos son estables con un método distinto a K-Means
- **Análisis temporal de transición**: ¿En qué temporada específica migró Alonso de un cluster a otro? ¿Cuándo "entró" Verstappen al Panteón?
- **DBSCAN** para identificar outliers reales: pilotos que no encajan en ningún arquetipo
- **Variables de contexto adverso**: lluvia, safety cars, estrategias de pit stop — métricas que podrían revelar diferencias dentro del Panteón
- **Aplicación web real** con Flask o Streamlit para que los fans busquen cualquier piloto y vean su perfil completo

---

## El entregable

El dashboard `dashboard_f1.html` es un archivo HTML de 95KB que se abre en cualquier navegador sin instalar nada. Contiene los 266 pilotos embebidos como JSON, cuatro visualizaciones interactivas y una tabla con buscador. No necesita servidor, no necesita conexión a internet (excepto para la tipografía de Google Fonts).

Es exactamente el tipo de entregable que diferencia un proyecto de portafolio de un notebook bien documentado.

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

const md = document.getElementById('md-source').textContent;
document.getElementById('md-content').innerHTML = marked.parse(md);
