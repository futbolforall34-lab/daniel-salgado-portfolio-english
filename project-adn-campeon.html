# The DNA of a Champion

### Clustering Historic Formula 1 Drivers — 1950 to 2024

---

## What is this project about?

Formula 1 has 75 years of history and a question that no one has answered very well:

**What makes a champion different? Is it talent, the car, or simply the right era?**

I took data from 861 drivers, filtered the 266 with sufficient career history to analyze, built 17 performance metrics that allow fairly comparing Fangio to Verstappen, and applied unsupervised clustering to let the data answer itself.

The result: **4 archetypes that structure the entire history of the sport**, from the pioneers of the 1950s to the drivers racing today.

---

## The Real Problem

Comparing drivers from different eras with raw statistics is a methodological error. Fangio raced 51 races. Hamilton raced 356. Saying Hamilton is "better" because he has more wins is statistically irrelevant.

The solution was to build **rate-based metrics**: rates, proportions, relative positions. That way, each driver is represented by **how they performed given the context of their era**, not by how much they accumulated.

---

## What was done

The project followed a complete Data Science pipeline:

1. **Data Audit** — 8 relational CSVs, null detection, temporal ranges, identification of limitations (qualifying only complete from 2003, lap times from 1996)

2. **Feature Engineering** — Multi-key joins between tables, construction of 17 derived variables, classification of top teams by historical era (dominant teams change each decade)

3. **EDA** — Key correlations: win_rate correlates 0.86 with podium_rate and 0.82 with world titles. But top_team_ratio only correlates 0.47 — the car matters, but doesn't explain everything.

4. **K-Means Clustering** — K between 2 and 11 were evaluated. The statistically optimal K was K=2 (Silhouette=0.351), but it produced trivial separation with no interpretive value. K=4 was chosen (Silhouette=0.322), a difference of only 0.029 points justified by much richer and more actionable archetypes.

5. **Archetype Profiling** — Narrative naming, radar charts by cluster, identification of representative drivers.

6. **Interactive Dashboard** — Self-contained 95KB HTML with F1 aesthetics: interactive paddock map, radars by archetype, Hall of Fame with real-time search, 6 non-obvious insights.

---

## What was found

The data revealed 4 natural archetypes that make sense both statistically and narratively:

**The Pantheon** — 11 drivers. Hamilton, Schumacher, Verstappen, Fangio, Senna, Prost... Win rate of 28%. Almost 1 out of every 3 starts ends in victory. 44 world titles concentrated in this group.

**The Gladiator** — 82 drivers. Alonso, Räikkönen, Mansell, Piquet, Häkkinen... Serious competitors, some champions, but their overall statistics don't reach the Pantheon level because they didn't maintain that performance throughout their career.

**The Modern Soldier** — 37 drivers. Norris, Russell, Piastri... The hybrid era defines them. Lowest DNF rate in history (19%) thanks to modern mechanical reliability, but without access to winning machinery.

**The Fragile Pioneer** — 136 drivers. The largest group. DNF rate of 57% — not because they were bad drivers, but because cars from the 1950s-70s simply broke down. They are statistical victims of their era.

---

## The most important insight

> The quadrant "without a good car but with many wins" is **almost empty** in all of F1 history.

Stirling Moss comes close. No one else. This confirms something fans have debated for decades: **without competitive machinery it is statistically impossible to win in Formula 1**, no matter the talent.

---

## Skills Demonstrated

**Languages and Libraries**
- Python (pandas, numpy, scikit-learn, matplotlib, seaborn)
- HTML / CSS / JavaScript
- Chart.js 4.4.0

**Machine Learning Techniques**
- K-Means Clustering (sklearn)
- StandardScaler for pre-clustering normalization
- PCA for dimensional reduction (2D and 3D)
- Silhouette Score and Elbow Method for K selection
- MinMaxScaler for radar chart normalization

**Data Engineering**
- Multi-key joins between 8 relational tables
- Feature engineering from scratch (17 derived variables)
- Handling missing data with documented imputation
- Cleaning columns with mixed types

**Thinking**
- Business decision over statistical optimum (K=4 vs K=2) with documented justification
- Design of cross-era comparable metrics (rate-based vs. raw totals)
- Contextual classification of top teams by historical era
- Identification and documentation of dataset limitations

**Visualization and Storytelling**
- Self-contained interactive dashboard (no backend, no server)
- F1 themed aesthetics: color palette, Orbitron typography, CSS animations
- Interactive scatter with archetype filters and tooltips with statistics
- Comparative radar charts by archetype
- Hall of Fame with real-time search
- 6 insight cards with non-obvious findings

---

## Next Steps

What I would do if this project had a second phase:

- **Hierarchical Clustering** to validate that the 4 archetypes are stable with a method other than K-Means
- **Temporal Transition Analysis**: In what specific season did Alonso migrate from one cluster to another? When did Verstappen "enter" the Pantheon?
- **DBSCAN** to identify true outliers: drivers that don't fit any archetype
- **Adversarial Context Variables**: rain, safety cars, pit stop strategies — metrics that could reveal differences within the Pantheon
- **Real Web Application** with Flask or Streamlit for fans to search any driver and see their full profile

---

## The Deliverable

The `dashboard_f1.html` dashboard is a 95KB HTML file that opens in any browser without installing anything. It contains the 266 drivers embedded as JSON, four interactive visualizations, and a table with search. It needs no server, no internet connection (except for Google Fonts).

It's exactly the type of deliverable that differentiates a portfolio project from a well-documented notebook.

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
