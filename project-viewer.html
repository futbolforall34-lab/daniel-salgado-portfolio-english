<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Proyecto | Daniel Salgado</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;background:#060e20;color:#dee5ff;overflow-x:hidden;min-height:100vh}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#060e20}
  ::-webkit-scrollbar-thumb{background:#40485d;border-radius:2px}

  /* Background canvas */
  #bg-canvas{position:fixed;inset:0;pointer-events:none;opacity:0.25;z-index:0}

  /* Orbs */
  .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
  .orb-1{width:40%;height:40%;top:-10%;left:-10%;background:#72dcff;opacity:.08;animation:orb-float1 8s ease-in-out infinite}
  .orb-2{width:30%;height:30%;bottom:-10%;right:-10%;background:#ac8aff;opacity:.07;animation:orb-float2 10s ease-in-out infinite}
  @keyframes orb-float1{0%,100%{transform:translate(0,0)}50%{transform:translate(5%,8%)}}
  @keyframes orb-float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-6%,-5%)}}

  /* Nav */
  #navbar{background:rgba(6,14,32,.92);border-bottom:1px solid rgba(64,72,93,.3);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}

  /* Content wrapper */
  #content-wrap{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:3rem 1.5rem 5rem}

  /* Markdown styles */
  #md-content h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;color:#dee5ff;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(64,72,93,.4)}
  #md-content h2{font-family:'Space Grotesk',sans-serif;font-size:1.375rem;font-weight:700;letter-spacing:-.02em;color:#72dcff;margin:2.5rem 0 1rem;padding-left:.75rem;border-left:2px solid #72dcff}
  #md-content h3{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;color:#69f6b8;margin:1.75rem 0 .625rem}
  #md-content h4{font-family:'Space Grotesk',sans-serif;font-size:.9375rem;font-weight:600;color:#ac8aff;margin:1.25rem 0 .5rem}
  #md-content p{font-size:.9375rem;line-height:1.75;color:#a3aac4;margin-bottom:1rem}
  #md-content ul,#md-content ol{padding-left:1.5rem;margin-bottom:1rem}
  #md-content li{font-size:.9375rem;line-height:1.75;color:#a3aac4;margin-bottom:.25rem}
  #md-content li::marker{color:#72dcff}
  #md-content strong{color:#dee5ff;font-weight:600}
  #md-content em{color:#ac8aff;font-style:italic}
  #md-content code{font-family:'Courier New',monospace;font-size:.8125rem;background:#0f1930;color:#69f6b8;padding:.15rem .4rem;border-radius:.25rem;border:1px solid rgba(105,246,184,.15)}
  #md-content pre{background:#091328;border:1px solid #192540;border-radius:.5rem;padding:1.25rem;overflow-x:auto;margin:1.25rem 0}
  #md-content pre code{background:none;border:none;padding:0;font-size:.8125rem;color:#69f6b8}
  #md-content blockquote{border-left:3px solid #72dcff;padding-left:1.25rem;margin:1.5rem 0;background:rgba(114,220,255,.04);border-radius:0 .375rem .375rem 0;padding:1rem 1.25rem}
  #md-content blockquote p{color:#a3aac4;margin:0;font-style:italic}
  #md-content table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:.875rem}
  #md-content th{background:#141f38;color:#72dcff;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem;text-align:left;border-bottom:1px solid #40485d}
  #md-content td{padding:.625rem 1rem;border-bottom:1px solid rgba(64,72,93,.3);color:#a3aac4}
  #md-content tr:last-child td{border-bottom:none}
  #md-content tr:hover td{background:rgba(114,220,255,.03)}
  #md-content hr{border:none;border-top:1px solid #192540;margin:2.5rem 0}
  #md-content a{color:#72dcff;text-decoration:none;border-bottom:1px solid rgba(114,220,255,.3);transition:border-color .2s,color .2s}
  #md-content a:hover{color:#69f6b8;border-color:rgba(105,246,184,.5)}
  #md-content img{max-width:100%;border-radius:.5rem;margin:1rem 0}

  /* Loader */
  #loader{position:fixed;inset:0;z-index:100;background:#060e20;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
  #loader.hidden{opacity:0;pointer-events:none}
  .loader-ring{width:40px;height:40px;border:1px solid #40485d;border-top-color:#72dcff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Error */
  #error-msg{display:none;text-align:center;padding:4rem 2rem}
  #error-msg h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;color:#dee5ff;margin-bottom:.75rem}
  #error-msg p{color:#6d758c;font-size:.9375rem}

  /* Back btn */
  .back-btn{display:inline-flex;align-items:center;gap:.5rem;color:#a3aac4;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8125rem;font-weight:500;padding:.5rem 1rem;border:1px solid rgba(64,72,93,.5);border-radius:.25rem;transition:color .2s,border-color .2s,background .2s}
  .back-btn:hover{color:#72dcff;border-color:rgba(114,220,255,.4);background:rgba(114,220,255,.05)}
  .back-btn svg{transition:transform .2s}
  .back-btn:hover svg{transform:translateX(-3px)}

  /* Tag pill */
  .tag{font-size:.625rem;padding:.2rem .5rem;border-radius:.25rem;background:#192540;color:#a3aac4;white-space:nowrap;display:inline-block}
</style>
</head>
<body>

<div id="loader"><div class="loader-ring"></div></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="bg-canvas"></canvas>

<!-- Nav -->
<nav id="navbar">
  <div style="max-width:800px;margin:0 auto;padding:.875rem 1.5rem;display:flex;justify-content:space-between;align-items:center">
    <a href="index.html" style="font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:#dee5ff;text-decoration:none;letter-spacing:-.01em">Daniel Salgado</a>
    <a class="back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back to Portfolio
    </a>
  </div>
</nav>

<!-- Content -->
<div id="content-wrap">
  <div id="error-msg">
    <h2>Archivo no encontrado</h2>
    <p>No se pudo cargar el proyecto. <a href="index.html" style="color:#72dcff">Back to Portfolio</a></p>
  </div>
  <div id="md-content"></div>
</div>

<script>
// Particles
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['rgba(114,220,255,','rgba(105,246,184,','rgba(172,138,255,'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: Math.random()*1.5+.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      opacity: Math.random()*.35+.1
    });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.color+p.opacity+')'; ctx.fill();
    });
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle=`rgba(114,220,255,${.05*(1-d/100)})`; ctx.lineWidth=.5; ctx.stroke(); }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// Load markdown
(function() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const loader = document.getElementById('loader');
  const mdDiv = document.getElementById('md-content');
  const errDiv = document.getElementById('error-msg');

  if (!file) {
    loader.classList.add('hidden');
    errDiv.style.display = 'block';
    return;
  }

  document.title = decodeURIComponent(file).split('/').pop().replace('.md','') + ' | Daniel Salgado';

  fetch(file)
    .then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.text();
    })
    .then(md => {
      mdDiv.innerHTML = marked.parse(md);
      loader.classList.add('hidden');
    })
    .catch(() => {
      loader.classList.add('hidden');
      errDiv.style.display = 'block';
    });
})();
</script>
</body>
</html>
